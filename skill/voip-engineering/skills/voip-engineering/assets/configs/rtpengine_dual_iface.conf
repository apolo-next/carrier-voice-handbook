# rtpengine_dual_iface.conf — Configuración dual-interface para NAT
# Reemplazar 10.0.0.50 (interna) y 200.x.x.x (pública) con IPs reales

[rtpengine]
table = 0

# Dual interface — clave para NAT carrier ↔ softswitch interno
interface = internal/10.0.0.50;external/200.x.x.x

# ng-protocol (Kamailio habla aquí)
listen-ng = 127.0.0.1:2223

# Rango RTP — abrir en firewall
port-min = 30000
port-max = 40000

# Logging
log-level = 6
log-facility = local3
log-stderr = false

# Timers
timeout = 60
silent-timeout = 3600
final-timeout = 0
delete-delay = 30

# Performance
num-threads = 8
media-num-threads = 4

# Recording (descomenta si aplica)
# recording-method = pcap
# recording-format = eth
# recording-dir = /var/spool/rtpengine

# TOS para QoS upstream
tos = 184
