#!KAMAILIO
# kamailio_sbc_edge.cfg — Plantilla SBC edge minimalista
# Stack: Kamailio 5.7+ frente a carrier, FreeSWITCH detrás
# Adaptado para Apolo IVR 119 pattern

####### Defines #######
#!define DBURL "mysql://kamailio:CHANGEME@localhost/kamailio"
#!define FS_ADDR "10.0.0.50"
#!define FS_PORT "5080"
#!define EXT_IP  "200.x.x.x"
#!define INT_IP  "10.0.0.10"

####### Global #######
debug=2
log_stderror=no
log_facility=LOG_LOCAL1
children=8
tcp_children=4

listen=udp:INT_IP:5060
listen=udp:EXT_IP:5060
alias="sbc.apolo.local"

mpath="/usr/lib64/kamailio/modules/"

loadmodule "tm.so"
loadmodule "rr.so"
loadmodule "sl.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "rtpengine.so"
loadmodule "permissions.so"
loadmodule "dispatcher.so"
loadmodule "htable.so"

modparam("tm", "fr_timer", 5000)
modparam("tm", "fr_inv_timer", 60000)

modparam("rtpengine", "rtpengine_sock", "udp:127.0.0.1:2223")
modparam("rtpengine", "extra_id_pv", "$avp(extra_id)")

modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")
modparam("dispatcher", "flags", 2)
modparam("dispatcher", "ds_ping_interval", 30)
modparam("dispatcher", "ds_probing_mode", 1)

modparam("permissions", "db_url", DBURL)
modparam("permissions", "address_table", "address")

modparam("htable", "htable", "calls=>size=10;autoexpire=7200")

####### Routing #######

request_route {
    # 1. Sanity
    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "Malformed SIP from $si\n");
        exit;
    }

    # 2. Max-Forwards
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    # 3. Loose routing (in-dialog)
    if (has_totag()) {
        if (loose_route()) {
            route(RELAY);
        } else {
            sl_send_reply("404", "Not here");
        }
        exit;
    }

    # 4. CANCEL
    if (is_method("CANCEL")) {
        if (t_check_trans()) t_relay();
        exit;
    }

    # 5. ACL — solo carriers permitidos
    if (!allow_source_address("1")) {
        xlog("L_WARN", "Blocked source: $si\n");
        sl_send_reply("403", "Forbidden");
        exit;
    }

    # 6. Concurrent call limit
    if (is_method("INVITE")) {
        $sht(calls=>$si::count) = $sht(calls=>$si::count) + 1;
        if ($sht(calls=>$si::count) > 100) {
            sl_send_reply("486", "Busy - call limit");
            exit;
        }
    }

    # 7. Routing al softswitch
    if (is_method("INVITE")) {
        record_route();
        rtpengine_offer("replace-origin replace-session-connection ICE=remove");
        $du = "sip:" + FS_ADDR + ":" + FS_PORT;
        route(RELAY);
        exit;
    }

    sl_send_reply("405", "Method Not Allowed");
}

route[RELAY] {
    if (!t_relay()) sl_reply_error();
    exit;
}

onreply_route {
    if (status=~"(183)|(2[0-9][0-9])") {
        rtpengine_answer("replace-origin replace-session-connection ICE=remove");
    }
}

failure_route {
    if (t_is_canceled()) exit;
    if (t_check_status("408|503|500")) {
        # failover via dispatcher
        if (ds_next_dst()) {
            t_on_failure("failure_route");
            route(RELAY);
            exit;
        }
    }
}

event_route[tm:branch-failure:default] {
    xlog("L_INFO", "Branch failure $T_branch_idx status $T_reply_code\n");
}
