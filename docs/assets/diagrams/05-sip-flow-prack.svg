<svg width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SIP flow for IVR with PRACK interworking">
  <defs>
    <marker id="arrow5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Carrier column -->
  <rect x="40" y="20" width="140" height="36" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="110" y="42" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Carrier</text>
  <line x1="110" y1="56" x2="110" y2="510" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>

  <!-- Kamailio column -->
  <rect x="220" y="20" width="140" height="36" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="290" y="42" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500" fill="#26215C">Kamailio</text>
  <line x1="290" y1="56" x2="290" y2="510" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>

  <!-- FreeSWITCH column -->
  <rect x="400" y="20" width="140" height="36" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="470" y="42" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500" fill="#26215C">FreeSWITCH</text>
  <line x1="470" y1="56" x2="470" y2="510" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>

  <!-- IVR app column -->
  <rect x="570" y="20" width="80" height="36" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="610" y="42" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500" fill="#04342C">IVR app</text>
  <line x1="610" y1="56" x2="610" y2="510" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>

  <!-- INVITE -->
  <line x1="110" y1="90" x2="290" y2="90" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow5)"/>
  <text x="200" y="84" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#3C3489">INVITE (with 100rel required)</text>

  <!-- INVITE relayed -->
  <line x1="290" y1="120" x2="470" y2="120" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow5)"/>
  <text x="380" y="114" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#3C3489">INVITE (relayed)</text>

  <!-- 100 Trying back -->
  <line x1="470" y1="150" x2="290" y2="150" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow5)"/>
  <text x="380" y="144" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#0F6E56">100 Trying</text>

  <line x1="290" y1="180" x2="110" y2="180" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow5)"/>
  <text x="200" y="174" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#0F6E56">100 Trying</text>

  <!-- 183 Session Progress -->
  <line x1="470" y1="220" x2="110" y2="220" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow5)"/>
  <text x="290" y="214" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#854F0B">183 Session Progress (reliable, RSeq)</text>

  <!-- PRACK -->
  <line x1="110" y1="260" x2="470" y2="260" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow5)"/>
  <text x="290" y="254" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#854F0B">PRACK</text>

  <!-- 200 OK PRACK -->
  <line x1="470" y1="290" x2="110" y2="290" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow5)"/>
  <text x="290" y="284" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#0F6E56">200 OK (PRACK)</text>

  <!-- answer to IVR -->
  <line x1="470" y1="330" x2="610" y2="330" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow5)"/>
  <text x="540" y="324" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#0F6E56">answer</text>

  <!-- 200 OK INVITE -->
  <line x1="470" y1="365" x2="110" y2="365" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow5)"/>
  <text x="290" y="359" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#0F6E56">200 OK (INVITE)</text>

  <!-- ACK -->
  <line x1="110" y1="395" x2="470" y2="395" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow5)"/>
  <text x="290" y="389" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#3C3489">ACK</text>

  <!-- Note box -->
  <rect x="40" y="430" width="620" height="80" rx="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="60" y="455" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500" fill="#444441">FreeSWITCH as B2BUA absorbs PRACK semantics</text>
  <text x="60" y="478" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#5F5E5A">Kamailio is a stateful proxy and cannot transform PRACK requirements between legs.</text>
  <text x="60" y="496" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#5F5E5A">FreeSWITCH terminates and re-originates, letting the IVR app stay PRACK-unaware.</text>
</svg>
