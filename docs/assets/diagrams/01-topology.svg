<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Carrier-class VoIP topology">
  <defs>
    <marker id="arrow1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Carrier -->
  <rect x="40" y="170" width="120" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="100" y="192" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Carrier</text>
  <text x="100" y="210" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#5F5E5A">SIP trunk</text>

  <!-- Kamailio -->
  <rect x="220" y="60" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="300" y="82" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500" fill="#26215C">Kamailio SBC</text>
  <text x="300" y="100" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#534AB7">Signaling, ACL, routing</text>

  <!-- RTPEngine -->
  <rect x="220" y="280" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="300" y="302" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500" fill="#04342C">RTPEngine</text>
  <text x="300" y="320" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#0F6E56">Media relay, NAT</text>

  <!-- FreeSWITCH -->
  <rect x="440" y="170" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="530" y="192" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500" fill="#26215C">FreeSWITCH</text>
  <text x="530" y="210" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#534AB7">B2BUA, IVR, dialplan</text>

  <!-- SIP signaling lines -->
  <line x1="160" y1="180" x2="218" y2="100" stroke="#534AB7" stroke-width="2" marker-end="url(#arrow1)"/>
  <text x="170" y="135" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#3C3489" font-weight="500">SIP</text>

  <line x1="380" y1="100" x2="438" y2="180" stroke="#534AB7" stroke-width="2" marker-end="url(#arrow1)"/>
  <text x="408" y="135" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#3C3489" font-weight="500">SIP</text>

  <!-- RTP media lines -->
  <line x1="160" y1="216" x2="218" y2="296" stroke="#1D9E75" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow1)"/>
  <text x="170" y="265" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#0F6E56" font-weight="500">RTP</text>

  <line x1="380" y1="296" x2="438" y2="216" stroke="#1D9E75" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow1)"/>
  <text x="396" y="265" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#0F6E56" font-weight="500">RTP</text>

  <!-- ng-protocol control -->
  <line x1="300" y1="116" x2="300" y2="276" stroke="#888780" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="320" y="200" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#5F5E5A">ng-protocol</text>
  <text x="320" y="216" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#5F5E5A">offer/answer</text>

  <!-- Legend -->
  <text x="50" y="380" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#5F5E5A" font-style="italic">Solid line = SIP signaling</text>
  <text x="50" y="398" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#5F5E5A" font-style="italic">Dashed line = RTP media</text>
</svg>
