<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="From NOC to voice specialist">
  <defs>
    <marker id="arrow4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- NOC operator -->
  <rect x="20" y="40" width="140" height="80" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="90" y="64" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">NOC operator</text>
  <text x="90" y="84" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#5F5E5A">1-2 years</text>
  <text x="90" y="102" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#5F5E5A">Alarms, escalation</text>

  <!-- Network engineer -->
  <rect x="190" y="40" width="140" height="80" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="260" y="64" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500" fill="#042C53">Network engineer</text>
  <text x="260" y="84" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#185FA5">2-4 years</text>
  <text x="260" y="102" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#185FA5">Routing, capture, fix</text>

  <!-- Voice engineer -->
  <rect x="360" y="40" width="140" height="80" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="430" y="64" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500" fill="#04342C">Voice engineer</text>
  <text x="430" y="84" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#0F6E56">3-5 years</text>
  <text x="430" y="102" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#0F6E56">SIP, RTP, dialplans</text>

  <!-- Voice specialist -->
  <rect x="530" y="40" width="140" height="80" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="600" y="64" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500" fill="#26215C">Voice specialist</text>
  <text x="600" y="84" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#534AB7">5+ years</text>
  <text x="600" y="102" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#534AB7">Architecture, scale</text>

  <!-- Arrows -->
  <line x1="160" y1="80" x2="190" y2="80" stroke="#534AB7" stroke-width="2" marker-end="url(#arrow4)"/>
  <line x1="330" y1="80" x2="360" y2="80" stroke="#534AB7" stroke-width="2" marker-end="url(#arrow4)"/>
  <line x1="500" y1="80" x2="530" y2="80" stroke="#534AB7" stroke-width="2" marker-end="url(#arrow4)"/>

  <!-- What compounds -->
  <text x="20" y="170" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500" fill="#444441">What compounds at every stage</text>

  <rect x="20" y="190" width="200" height="60" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="120" y="212" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500" fill="#412402">Protocol thinking</text>
  <text x="120" y="230" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#854F0B">Read RFCs, trace flows</text>

  <rect x="240" y="190" width="200" height="60" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="340" y="212" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500" fill="#412402">Packet capture fluency</text>
  <text x="340" y="230" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#854F0B">tcpdump, sngrep, Wireshark</text>

  <rect x="460" y="190" width="200" height="60" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="560" y="212" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500" fill="#412402">Reproducing failures</text>
  <text x="560" y="230" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#854F0B">Labs, scripting, discipline</text>

  <!-- Note -->
  <rect x="20" y="280" width="640" height="60" rx="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="40" y="305" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#5F5E5A" font-style="italic">The path is not linear. You'll loop back to lower stages many times.</text>
  <text x="40" y="323" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#5F5E5A" font-style="italic">Each loop deepens the layer below, not just the one you're climbing toward.</text>
</svg>
